name: HA Maintenance Hub
version: "1.6.0"
slug: yaml_script_manager
description: Health, Wartung und YAML-Konfiguration für Home Assistant
url: https://github.com/tonybruser/ha-app-yaml-manager
arch:
  - aarch64
  - amd64
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:wrench-cog-outline
panel_title: Maintenance
panel_admin: true
homeassistant_api: true
map:
  - type: homeassistant_config
    read_only: false
    path: /homeassistant
watchdog: http://[HOST]:[PORT:8099]/health
