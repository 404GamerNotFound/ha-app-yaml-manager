name: YAML Script Manager
version: "0.3.0"
slug: yaml_script_manager
description: Verwalten und bearbeiten von Home-Assistant-Skripten in packages
url: https://github.com/tonybruser/ha-app-yaml-manager
arch:
  - aarch64
  - amd64
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:script-text-outline
panel_title: Skripte
panel_admin: true
homeassistant_api: true
map:
  - type: homeassistant_config
    read_only: false
    path: /homeassistant
watchdog: http://[HOST]:[PORT:8099]/health
