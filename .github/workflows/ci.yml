name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: yaml_manager/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r yaml_manager/requirements.txt

      - name: Compile Python files
        run: python -m compileall -q yaml_manager tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test*.py"

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build add-on image
        run: docker build --build-arg BUILD_VERSION=ci --build-arg BUILD_ARCH=amd64 -f yaml_manager/Dockerfile yaml_manager
